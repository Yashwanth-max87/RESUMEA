services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: smart_resume
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: resume_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    depends_on:
      - postgres
      - ai-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smart_resume
      SPRING_DATASOURCE_USERNAME: resume_user
      SPRING_DATASOURCE_PASSWORD: resume_pass
      APP_JWT_SECRET: change-me-to-a-long-random-secret
      APP_AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8080/api
    ports:
      - "5173:5173"

volumes:
  postgres_data:

